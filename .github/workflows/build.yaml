name: Build Docker Container & Push to Registry

on:
    workflow_call:
    workflow_dispatch:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: backend-py
        env:
            WEBSITE_HOSTNAME: localhost:8000
            FRONTEND_HOSTNAME: localhost:3000
        strategy:
            max-parallel: 4
            matrix:
                python-version: [3.10, 3.11]

        steps:
            - uses: actions/checkout@v3
            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@v3
              with:
                  python-version: ${{ matrix.python-version }}
            - name: Install Dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install poetry
                  pip install flake8
            - name: Install poetry dependencies
              run: |
                  poetry install
            - name: Look for major issues with flake8
              run: |
                  flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
            - name: Build Docker Container
              run: |
                  docker build -t backend-py .
            - name: Push Docker Container to Registry
              run: |
                  echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
                  docker tag backend-py ${{ secrets.DOCKER_USERNAME }}/backend-py
                  docker push ${{ secrets.DOCKER_USERNAME }}/backend-py
